<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon / app icons (로고 응용) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />


    <!-- ===== SEO: 브랜드명 통일 "Nuga Skin Clinic" (기존 'Nuge' 오타 폐기) ===== -->
    <title>Nuga Skin Clinic | K-Beauty Med Spa in Duluth, GA (누가 스킨 클리닉)</title>
    <meta
      name="description"
      content="Nuga Skin Clinic — Seoul-grade skincare and aesthetic care in Duluth, GA. Thermage FLX, Ultherapy, Potenza, InMode, Botox, and Korean skin treatments. 4.9★ · 70+ reviews."
    />
    <link rel="canonical" href="https://www.nugamedispa.com/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nuga Skin Clinic | K-Beauty Med Spa in Duluth, GA" />
    <meta
      property="og:description"
      content="Seoul-grade skincare and aesthetic care in Duluth, GA. Book a consultation with Atlanta's trusted Korean skin clinic."
    />
    <meta property="og:url" content="https://www.nugamedispa.com/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- LocalBusiness structured data (helps local SEO; NAP must match GBP exactly) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MedicalBusiness",
        "name": "Nuga Skin Clinic",
        "image": "https://www.nugamedispa.com/og.jpg",
        "telephone": "+1-770-687-2545",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "2005 Boggs Rd #101",
          "addressLocality": "Duluth",
          "addressRegion": "GA",
          "postalCode": "30096",
          "addressCountry": "US"
        },
        "url": "https://www.nugamedispa.com/",
        "priceRange": "$$$",
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
          "opens": "09:30",
          "closes": "18:30"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "151"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
